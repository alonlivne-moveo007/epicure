$kind: http-request
name: POST /api/dishes
description: Create a dish. Adjust `data` fields to match your Strapi schema
  (and relations as id or connect syntax). `populate=*` shapes the created entry
  in the response.
url: "{{baseUrl}}/api/dishes?populate=*"
method: POST
headers:
  Content-Type: application/json
queryParams:
  populate: "*"
body:
  type: text
  content: |-
    {
      "data": {
        "name": "Example Dish",
        "description": "Optional description"
      }
    }
order: 3000
