$kind: http-request
name: PUT /api/dishes/:id
description: Update a dish by id. `populate=*` shapes the updated entry in the response.
url: "{{baseUrl}}/api/dishes/{{dishId}}?populate=*"
method: PUT
headers:
  Content-Type: application/json
queryParams:
  populate: "*"
body:
  type: text
  content: |-
    {
      "data": {
        "name": "Updated Dish Name",
        "description": "Updated description"
      }
    }
order: 4000
