# Run the full stack: frontend → backend → cms
# Usage: docker compose up --build
# App: http://localhost:3000  |  Strapi admin: http://localhost:1337/admin
#
# Strapi persistence: bind-mount apps/cms so Content-Type Builder schemas under
# src/api survive container recreation. SQLite + uploads stay on named volume
# strapi-data at apps/cms/.tmp (survives `docker compose down` without -v).
# Anonymous node_modules volume keeps Linux native deps from the image (e.g.
# better-sqlite3) — do not rely on host Mac node_modules inside the container.

services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - HOSTNAME=0.0.0.0
      - PORT=3000
      # Frontend calls backend by service name (server-side)
      - NEXT_PUBLIC_API_URL=http://localhost:3002
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/cms/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3002:3002"
    env_file:
      - apps/backend/.env
    environment:
      - NODE_ENV=development
      - PORT=3002
      # Backend calls cms by service name
      - CMS_URL=http://cms:1337
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/cms/node_modules
    depends_on:
      - cms

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    ports:
      - "1337:1337"
    env_file:
      - apps/cms/.env
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=1337
      # Admin panel (browser) talks to API at localhost, not cms:1337
      - STRAPI_ADMIN_BACKEND_URL=http://localhost:1337
    volumes:
      - ./apps/cms:/app/apps/cms
      # Named volume: SQLite + uploads; overlays host bind so DB is not only on the host copy.
      - strapi-data:/app/apps/cms/.tmp
      # Preserve image-built deps (Linux); host bind would otherwise expose darwin binaries.
      - /app/apps/cms/node_modules

volumes:
  strapi-data:
